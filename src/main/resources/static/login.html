<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardHub - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-page">

<header class="topbar">

</header>
<main class="login-main">
    <section class="login-card">
    <h2>Guard Portal</h2>

    <p class="login-subtitle">
        Log in to see and manage your shifts
    </p>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">
                E-mail
            </label>
            <input
                type="email"
                id="email"
                name="email"
                required
                >
        </div>

        <div class="form-group">
            <label for="password">
                Password
            </label>
            <input
                type="password"
                id="password"
                name="password"
                required
                >
        </div>

        <button type="submit">
            Log in
        </button>

        <p id="errorMessage"
           class="error-message">
            </p>
    </form>
    </section>
</main>

<script src="/js/login.js" type="module"></script>
</body>
</html>
