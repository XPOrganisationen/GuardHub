<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardHub - Users</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/submenu.css">
</head>

<body class="submenu-page">

<header class="topbar">
    <div class="topbar-brand">
        <img
                src="images/GuardhubLogo.png"
                alt="GuardHub logo"
                class="topbar-logo">
    </div>

    <h1>Client Management</h1>

    <button id="logoutButton" class="logout-button">
        Log out
    </button>
</header>

<main class="submenu-main">

    <section class="submenu-card">
        <div class="submenu-header">
            <div>
                <h2>Clients</h2>
                <p>View, search and manage clients</p>
            </div>

            <button id="openAddClientButton" class="primary-button">
                New client
            </button>
        </div>

        <div class="submenu-toolbar">
            <label for="searchInput">Search</label>

            <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by name or city..."
            >
        </div>

        <table class="submenu-table">
            <thead>
            <tr>
                <th>Name</th>
                <th>E-mail</th>
                <th>Phone number</th>
                <th>City</th>
                <th>Address</th>
            </tr>
            </thead>

            <tbody id="clientsTableBody">
            </tbody>
        </table>

        <p id="clientMessage" class="submenu-message"></p>
    </section>
</main>

<section id="addClientModal" class="modal hidden">
    <div class="modal-card">
        <h2>Client Form</h2>
        <form id="addClientForm">

            <div class="form-group">
                <label for="name">Name</label>
                <input id="name" type="text" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input id="email" type="email" required>
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone number</label>
                <input id="phoneNumber" type="text" required>
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input id="city" type="" required>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input id="address" type="text" required>
            </div>

            <p id="formMessage" class="form-message"></p>

            <div class="modal-actions">
                <button type="button" id="cancelAddClientButton" class="secondary-button">
                    Cancel
                </button>

                <button type="submit" class="primary-button">
                    Add Client
                </button>
            </div>

        </form>
    </div>
</section>

<script src="js/clients.js"></script>
</body>
</html>
