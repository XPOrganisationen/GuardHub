<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardHub - Users</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/submenu.css">
</head>

<body class="submenu-page">

<header class="topbar">
    
</header>

<main class="submenu-main">

    <section class="submenu-card">
        <div class="submenu-header">
            <div>
                <h2>Guards</h2>
                <p>View, search and manage guards</p>
            </div>

            <button id="openAddUserButton" class="primary-button">
                New guard
            </button>
        </div>

        <div class="submenu-toolbar">
            <label for="searchInput">Search</label>

            <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by name..."
            >
        </div>

        <table class="submenu-table">
            <thead>
            <tr>
                <th>Name</th>
                <th>E-mail</th>
                <th>Phone number</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody id="usersTableBody">
            </tbody>
        </table>

        <p id="userMessage" class="submenu-message"></p>
    </section>
</main>

<section id="addUserModal" class="modal hidden">
    <div class="modal-card">
        <h2>Guard Form</h2>
        <form id="addUserForm">

            <div class="form-group">
                <label for="name">Name</label>
                <input id="name" type="text" required>
            </div>


            <div class="form-group">
                <label for="email">E-mail</label>
                <input id="email" type="email" required>
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone number</label>
                <input id="phoneNumber" type="text" required>
            </div>

            <div class="form-group">
                <label for="password">Temporary password</label>
                <input id="password" type="password" required>
            </div>

            <p id="formMessage" class="form-message"></p>

            <div class="modal-actions">
                <button type="button" id="cancelAddUserButton" class="secondary-button">
                    Cancel
                </button>

                <button type="submit" class="primary-button">
                    Add Guard
                </button>
            </div>

        </form>
    </div>
</section>

<script src="js/users.js" type="module"></script>
</body>
</html>
